<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakerdust - Cloudflare Real-Time Multiplayer Arcade</title>
    <meta name="description" content="Play Speakerdust, a real-time multiplayer arcade game running serverless on Cloudflare Workers, Durable Objects, and D1 database.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui-layer">
        <h1 id="game-title">Speakerdust</h1>
        <p id="status" class="connecting">Conectando al servidor...</p>
    </div>
    <div class="canvas-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
